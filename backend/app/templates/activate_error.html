<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activation Error</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: rgba(17, 24, 39, 0.85);
            --error-color: #ef4444;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image: 
                radial-gradient(at 50% 0%, rgba(239, 68, 68, 0.1) 0px, transparent 60%);
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .icon-box {
            width: 64px;
            height: 64px;
            background: rgba(239, 68, 68, 0.1);
            border: 1.5px solid var(--error-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px auto;
            color: var(--error-color);
            font-size: 28px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
            font-weight: bold;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .detail-box {
            background: rgba(239, 68, 68, 0.05);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            padding: 15px;
            font-size: 14px;
            color: #fca5a5;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .footer-note {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">!</div>
        <h1>Activation Failed</h1>
        
        <div class="detail-box">
            {{ detail }}
        </div>

        <div class="footer-note">
            Please contact your system administrator or licensing support to check your license status, trial expiration, or activation device limits.
        </div>
    </div>

</body>
</html>
